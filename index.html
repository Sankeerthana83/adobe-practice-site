<!DOCTYPE html>
<html>
<head>
  <title>Adobe Analytics Practice</title>

  <script>
    window.digitalData = {
      page: {
        pageName: "home",
        siteSection: "practice-site"
      },
      user: {
        name: "",
        email: "",
        loginStatus: "guest"
      },
      events: []
    };
  </script>

  <style>
    body { font-family: Arial; margin: 40px; }
    button { margin: 10px; padding: 10px; }
  </style>
</head>

<body>

  <h1>Adobe Analytics Dummy Site</h1>

  <h2>Login Form</h2>
  <form id="loginForm">
    Name: <input type="text" id="name" required><br><br>
    Email: <input type="email" id="email" required><br><br>
    <button type="submit">Submit</button>
  </form>

  <hr>

  <h2>Download Section</h2>
  <a href="sample.pdf" download id="downloadLink">Download PDF</a>

  <hr>

  <h2>Actions</h2>
  <button id="btnClick">Simple Click</button>
  <button id="btnCart">Add to Cart</button>

  <hr>

  <h2>Digital Data</h2>
  <pre id="output"></pre>

  <script>
    function updateOutput(action) {
      document.getElementById("output").innerText =
        action + "\n\n" + JSON.stringify(digitalData, null, 2);
    }

    document.getElementById("loginForm").onsubmit = function(e) {
      e.preventDefault();

      digitalData.user.name = document.getElementById("name").value;
      digitalData.user.email = document.getElementById("email").value;
      digitalData.user.loginStatus = "logged-in";

      digitalData.events.push("formSubmit");

      updateOutput("Form Submitted");
    };

    document.getElementById("downloadLink").onclick = function() {
      digitalData.events.push("download");
      updateOutput("File Download Clicked");
    };

    document.getElementById("btnClick").onclick = function() {
      digitalData.events.push("buttonClick");
      updateOutput("Button Clicked");
    };

    document.getElementById("btnCart").onclick = function() {
      digitalData.events.push("addToCart");
      updateOutput("Add to Cart");
    };
  </script>

  <!-- Paste your Adobe Launch script below -->
  <!-- <script src="https://assets.adobedtm.com/XXXX.js"></script> -->

</body>
</html>
